<h2>Aperture di Scacchi</h2>

<div id="opening-container" class="fade-in">
  <div id="opening-list">
    <h3>Seleziona un'apertura</h3>

    <ul>
      <li onclick="loadOpening('italian')">Apertura Italiana</li>
      <li onclick="loadOpening('sicilian')">Difesa Siciliana</li>
      <li onclick="loadOpening('french')">Difesa Francese</li>
      <li onclick="loadOpening('caro')">Difesa Caro-Kann</li>
      <li onclick="loadOpening('queen_gambit')">Gambetto di Donna</li>
    </ul>
  </div>

  <div id="opening-view">
    <div class="board-area">
      <div id="board" style="width: 350px"></div>
      <div class="move-nav-controls">
        <button data-nav="start" class="btn" onclick="moveToStart()">
          Inizio
        </button>
        <button data-nav="back" class="btn" onclick="moveBack()">
          Indietro
        </button>
        <button data-nav="forward" class="btn" onclick="moveForward()">
          Avanti
        </button>
        <button data-nav="end" class="btn" onclick="moveToEnd()">Fine</button>
      </div>
    </div>

    <h3 id="opening-title">Seleziona un'apertura</h3>
    <p id="opening-desc">Le mosse appariranno qui.</p>

    <button class="btn" onclick="playOpening()">Riproduci Apertura</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script src="../components/openings.js"></script>
