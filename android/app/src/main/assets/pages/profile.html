<div class="profile-container fade-in">
  <h2>Profilo Utente</h2>

  <div class="profile-card">
    <img
      id="avatar"
      class="avatar"
      src="https://api.dicebear.com/7.x/bottts/svg?seed=Marco"
    />

    <h3 id="username">Marco</h3>

    <button class="btn" onclick="changeName()">Cambia Nome</button>
    <button class="btn" onclick="changeAvatar()">Cambia Avatar</button>

    <hr />

    <h3>Statistiche</h3>
    <ul class="stats-list">
      <li><strong>Partite giocate:</strong> <span id="games">0</span></li>
      <li><strong>Vittorie:</strong> <span id="wins">0</span></li>
      <li><strong>Puzzle risolti:</strong> <span id="puzzles">0</span></li>
    </ul>

    <hr />

    <button class="btn danger" onclick="resetStats()">Reset Statistiche</button>

    <hr />

    <h3>Collega Account Scacchi</h3>
    <p class="profile-import-hint">
      Inserisci qui il tuo username Chess.com o Lichess per scaricare le tue
      partite.
    </p>
    <div class="profile-import-tools">
      <label for="platform-select">Piattaforma</label>
      <select id="platform-select">
        <option value="chesscom">Chess.com</option>
        <option value="lichess">Lichess.org</option>
      </select>

      <label for="platform-username">Username</label>
      <input
        id="platform-username"
        type="text"
        placeholder="es. hikaru oppure erik"
      />

      <label for="games-limit">Numero partite</label>
      <input id="games-limit" type="number" min="1" max="200" value="25" />

      <label for="lichess-token">Token Lichess (opzionale)</label>
      <input
        id="lichess-token"
        type="password"
        placeholder="Necessario solo per partite non pubbliche"
      />

      <div class="profile-import-actions">
        <button class="btn" onclick="importPlatformGames()">
          Scarica Partite
        </button>
        <button class="btn" onclick="exportImportedGamesPgn()">
          Esporta PGN
        </button>
      </div>

      <div id="games-import-status" class="position-status"></div>
    </div>

    <div id="imported-games-container" class="imported-games-container"></div>
  </div>
</div>
<script>
  if (typeof initProfilePage === "function") {
    initProfilePage();
  }
</script>
